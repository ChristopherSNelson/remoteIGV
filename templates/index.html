<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>remoteIGV</title>
<script src="https://cdn.jsdelivr.net/npm/igv@3.1.0/dist/igv.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

  .toolbar {
    background: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100;
  }
  .toolbar h1 { font-size: 16px; font-weight: 700; color: #333; margin-right: 8px; }
  .toolbar select, .toolbar input, .toolbar button {
    font-size: 13px; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc;
    background: #fff; color: #333; outline: none;
  }
  .toolbar button { cursor: pointer; background: #4a90d9; color: #fff; border-color: #4a90d9; font-weight: 500; }
  .toolbar button:hover { background: #357abd; }
  .toolbar .sep { width: 1px; height: 22px; background: #ddd; }

  #locus-input { width: 260px; }
  #file-select { max-width: 300px; }

  #igv-div { padding: 8px; }

  #bottom-bar {
    background: #fff; padding: 8px 16px; display: flex; align-items: center; gap: 10px;
    border-top: 1px solid #ddd; position: sticky; bottom: 0; z-index: 100; flex-wrap: wrap;
  }
  #bottom-bar button { font-size: 13px; padding: 6px 14px; border-radius: 4px; border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer; font-weight: 500; }
  #bottom-bar button:hover { background: #f0f0f0; }
  .status { font-size: 12px; color: #888; flex: 1; }
  #share-input { font-size: 12px; width: 400px; max-width: 40vw; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; }

  .file-chip {
    display: inline-flex; align-items: center; gap: 4px; background: #e8f0fe; padding: 3px 8px;
    border-radius: 3px; margin: 2px; font-size: 12px; color: #333;
  }
  .file-chip .remove { cursor: pointer; color: #c00; font-weight: bold; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>remoteIGV</h1>
  <div class="sep"></div>

  <label>Region:
    <input id="locus-input" type="text" placeholder="chr1:12,345-67,890 or gene" value="chr11:119,076,212-119,102,218">
  </label>
  <button id="go-btn">Go</button>

  <div class="sep"></div>

  <label>Add track:
    <select id="file-select"><option value="">-- select file --</option></select>
  </label>
  <button id="add-track-btn">+ Add</button>
  <button id="add-all-btn">+ All BAMs</button>

  <div class="sep"></div>
  <span id="loaded-tracks" class="file-chip-area"></span>
</div>

<div id="igv-div"></div>

<div id="bottom-bar">
  <button id="snap-svg">Download SVG</button>
  <button id="snap-png">Download PNG</button>
  <button id="share-btn">Share link</button>
  <input id="share-input" type="text" readonly hidden>
  <span class="status" id="snap-status"></span>
</div>

<script>
// ── state ──────────────────────────────────────────────────────
let browser = null;
const loadedTracks = new Set();
let allFiles = [];

// ── URL params ─────────────────────────────────────────────────
function getUrlParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    locus: p.get('locus'),
    tracks: p.get('tracks') ? p.get('tracks').split(',') : null,
  };
}

function buildShareUrl() {
  const base = window.location.origin + window.location.pathname;
  const params = new URLSearchParams();
  if (browser) {
    const loci = browser.currentLoci();
    if (loci && loci.length) params.set('locus', loci[0]);
  }
  if (loadedTracks.size > 0) {
    params.set('tracks', [...loadedTracks].join(','));
  }
  return base + '?' + params.toString();
}

function updateUrlQuietly() {
  const url = buildShareUrl();
  history.replaceState(null, '', url);
}

// ── init IGV ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const params = getUrlParams();

  const locusInput = document.getElementById('locus-input');
  if (params.locus && /^chr[0-9XYM]/i.test(params.locus)) {
    locusInput.value = params.locus;
  }

  const options = {
    reference: {
      id: "hg38",
      name: "Human (GRCh38/hg38)",
      fastaURL: "https://s3.amazonaws.com/igv.broadinstitute.org/genomes/seq/hg38/hg38.fa",
      indexURL: "https://s3.amazonaws.com/igv.broadinstitute.org/genomes/seq/hg38/hg38.fa.fai",
      cytobandURL: "https://s3.amazonaws.com/igv.org.genomes/hg38/annotations/cytoBandIdeo.txt.gz",
      aliasURL: "https://s3.amazonaws.com/igv.org.genomes/hg38/hg38_alias.tab",
    },
    locus: locusInput.value,
    tracks: [
      {
        name: "Refseq Genes",
        format: "refgene",
        url: "https://s3.amazonaws.com/igv.org.genomes/hg38/refGene.sorted.txt.gz",
        indexURL: "https://s3.amazonaws.com/igv.org.genomes/hg38/refGene.sorted.txt.gz.tbi",
        visibilityWindow: -1,
        displayMode: "EXPANDED",
      },
      {
        name: "ENCODE cCREs",
        type: "annotation",
        format: "bigBed",
        url: "https://hgdownload.soe.ucsc.edu/gbdb/hg38/encode3/ccre/encodeCcreCombined.bb",
        displayMode: "EXPANDED",
        visibilityWindow: 2000000,
      },
      {
        name: "phyloP 100-way",
        type: "wig",
        format: "bigwig",
        url: "https://hgdownload.cse.ucsc.edu/goldenPath/hg38/phyloP100way/hg38.phyloP100way.bw",
        autoscale: true,
      },
    ],
  };

  browser = await igv.createBrowser(document.getElementById('igv-div'), options);

  browser.on('locuschange', () => {
    const loci = browser.currentLoci();
    if (loci && loci.length) {
      const locus = loci[0];
      // only update URL if it looks like valid coordinates (chr:start-end)
      if (/^chr[0-9XYM]/i.test(locus) && locus.includes(':')) {
        locusInput.value = locus;
        updateUrlQuietly();
      }
    }
  });

  await loadFileList();

  if (params.tracks) {
    for (const t of params.tracks) {
      await addTrackByPath(t);
    }
  } else {
    await autoLoadTracks();
  }
});

// ── file list ─────────────────────────────────────────────────
async function loadFileList() {
  const resp = await fetch('/api/files');
  allFiles = await resp.json();
  const sel = document.getElementById('file-select');
  for (const f of allFiles) {
    if (/\.(bai|crai|csi|tbi|idx)$/i.test(f.name)) continue;
    const opt = document.createElement('option');
    opt.value = f.path;
    const sizeMB = f.size / 1e6;
    const sizeStr = sizeMB >= 1 ? sizeMB.toFixed(0) + ' MB' : (f.size / 1e3).toFixed(0) + ' KB';
    opt.textContent = f.path + '  (' + sizeStr + ')';
    sel.appendChild(opt);
  }
}

// ── auto-load tracks on startup ───────────────────────────────
// Load all BAM/CRAM files plus small annotation tracks.
// Skip files that duplicate the built-in UCSC annotation tracks.
const SKIP_AUTO = /encode_ccres|mane_select|phyloP100way/i;

async function autoLoadTracks() {
  const ANNOTATION_SIZE_LIMIT = 5 * 1e6; // 5 MB for non-alignment files
  for (const f of allFiles) {
    if (/\.(bai|crai|csi|tbi|idx)$/i.test(f.name)) continue;
    if (SKIP_AUTO.test(f.name)) continue;
    // Always load BAM/CRAM (that's why you're here), size-limit annotations only
    const isAlignment = /\.(bam|cram)$/i.test(f.name);
    if (!isAlignment && f.size > ANNOTATION_SIZE_LIMIT) continue;
    await addTrackByPath(f.path);
  }
}

// ── track naming ──────────────────────────────────────────────
// Build a short, unique display name from a relative file path.
// If multiple files share the same filename, walk up parent dirs
// until the names are unique.
function shortTrackName(filePath) {
  const parts = filePath.split('/');
  const filename = parts[parts.length - 1];

  // Count how many loaded files share this filename
  const dupes = allFiles.filter(f => f.path.endsWith('/' + filename) || f.path === filename);
  if (dupes.length <= 1) return filename;

  // Walk up parent dirs until we have a unique name
  for (let depth = 2; depth <= parts.length; depth++) {
    const candidate = parts.slice(parts.length - depth).join('/');
    const others = dupes.filter(f => f.path.endsWith(candidate));
    if (others.length <= 1) return candidate;
  }
  return filePath;
}

// ── track loading ─────────────────────────────────────────────
function buildTrackConfig(filePath) {
  const url = '/data/' + filePath;
  const lower = filePath.toLowerCase();
  const name = shortTrackName(filePath);
  const config = { name, url };

  if (lower.endsWith('.bam')) {
    config.type = 'alignment';
    config.format = 'bam';
    config.indexURL = url + '.bai';
  } else if (lower.endsWith('.cram')) {
    config.type = 'alignment';
    config.format = 'cram';
    config.indexURL = url + '.crai';
  } else if (lower.endsWith('.vcf.gz')) {
    config.type = 'variant';
    config.format = 'vcf';
    config.indexURL = url + '.tbi';
  } else if (lower.endsWith('.bed.gz')) {
    config.type = 'annotation';
    config.format = 'bed';
    config.indexURL = url + '.tbi';
  } else if (lower.endsWith('.bed')) {
    config.type = 'annotation';
    config.format = 'bed';
    config.displayMode = 'EXPANDED';
  } else if (lower.endsWith('.bedgraph')) {
    config.type = 'wig';
    config.format = 'bedgraph';
  } else if (lower.endsWith('.bw') || lower.endsWith('.bigwig')) {
    config.type = 'wig';
    config.format = 'bigwig';
  } else if (lower.endsWith('.gtf.gz') || lower.endsWith('.gff.gz') || lower.endsWith('.gff3.gz')) {
    config.type = 'annotation';
    config.indexURL = url + '.tbi';
  }

  return config;
}

async function addTrackByPath(filePath) {
  if (!filePath || loadedTracks.has(filePath)) return;
  loadedTracks.add(filePath); // claim the slot before awaiting

  const config = buildTrackConfig(filePath);
  try {
    await browser.loadTrack(config);
    addChip(filePath, config.name);
    updateUrlQuietly();
  } catch (e) {
    loadedTracks.delete(filePath); // release on failure
    console.warn('Failed to load track:', filePath, e);
  }
}

function addChip(filePath, displayName) {
  const chip = document.createElement('span');
  chip.className = 'file-chip';
  chip.dataset.path = filePath;
  chip.innerHTML = displayName + ' <span class="remove" title="remove">&times;</span>';
  chip.querySelector('.remove').addEventListener('click', () => {
    browser.removeTrackByName(displayName);
    loadedTracks.delete(filePath);
    chip.remove();
    updateUrlQuietly();
  });
  document.getElementById('loaded-tracks').appendChild(chip);
}

// ── navigation ────────────────────────────────────────────────
document.getElementById('go-btn').addEventListener('click', () => {
  const locus = document.getElementById('locus-input').value.trim();
  if (browser && locus) browser.search(locus);
});
document.getElementById('locus-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('go-btn').click();
});

// ── add single track ─────────────────────────────────────────
document.getElementById('add-track-btn').addEventListener('click', () => {
  addTrackByPath(document.getElementById('file-select').value);
});

// ── add all BAMs ──────────────────────────────────────────────
document.getElementById('add-all-btn').addEventListener('click', async () => {
  for (const f of allFiles) {
    if (/\.bam$/i.test(f.name)) {
      await addTrackByPath(f.path);
    }
  }
});

// ── share link ───────────────────────────────────────────────
document.getElementById('share-btn').addEventListener('click', () => {
  const input = document.getElementById('share-input');
  const status = document.getElementById('snap-status');
  input.value = buildShareUrl();
  input.hidden = false;
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    status.textContent = 'Link copied to clipboard';
  }).catch(() => {
    status.textContent = 'Select and copy the link above';
  });
});

// ── snapshots ─────────────────────────────────────────────────
document.getElementById('snap-svg').addEventListener('click', async () => {
  if (!browser) return;
  const status = document.getElementById('snap-status');
  status.textContent = 'Generating SVG...';
  try {
    const svg = await browser.toSVG();
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    saveAs(blob, snapshotFilename('svg'));
    status.textContent = 'SVG saved!';
  } catch (e) { status.textContent = 'Error: ' + e.message; }
});

document.getElementById('snap-png').addEventListener('click', async () => {
  if (!browser) return;
  const status = document.getElementById('snap-status');
  status.textContent = 'Generating PNG...';
  try {
    const svg = await browser.toSVG();
    const blob = await svgToPngBlob(svg);
    saveAs(blob, snapshotFilename('png'));
    status.textContent = 'PNG saved!';
  } catch (e) { status.textContent = 'Error: ' + e.message; }
});

function snapshotFilename(ext) {
  const locus = document.getElementById('locus-input').value.trim().replace(/[^a-zA-Z0-9_:-]/g, '_');
  return 'igv_' + locus + '_' + Date.now() + '.' + ext;
}

function svgToPngBlob(svgString) {
  return new Promise((resolve, reject) => {
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, img.width, img.height);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Canvas toBlob failed')), 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('SVG render failed')); };
    img.src = url;
  });
}
</script>
</body>
</html>
